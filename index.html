<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ocean Cleanup Game</title>

<link rel="stylesheet" href="style.css"/>
</head>

<body>

<header>
  <div class="logo">🌊</div>
  <div>
    <h1>Ocean Cleanup Game</h1>
    <p>Drag trash into the bin to clean the ocean</p>
  </div>
</header>

<section class="dashboard">
  <div class="panel"><h3>Score</h3><p id="score">0</p></div>
  <div class="panel"><h3>Water Clean</h3><p id="waterPercent">0%</p></div>
  <div class="panel"><h3>Time</h3><p id="timer">60</p></div>
  <div class="panel"><h3>High Score</h3><p id="highScore">0</p></div>
</section>

<div class="controls">
  <button id="startBtn">Start</button>
  <button id="resetBtn">Reset</button>
</div>

<div class="message-area">
  <div id="factBox">Click Start to begin cleaning the ocean!</div>
</div>

<div id="gameArea"></div>

<!-- GAME OVER -->
<div id="overlay" class="hidden">
  <div class="popup">
    <h2 id="resultTitle"></h2>
    <p id="resultMessage"></p>
    <button id="playAgain">Play Again</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ocean Game FIXED</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<header>
  <h1>🌊 Ocean Cleanup</h1>
</header>

<main>

  <!-- DASHBOARD -->
  <div class="dashboard">
    <div>Score: <span id="score">0</span></div>
    <div>Best: <span id="highScore">0</span></div>
    <div>Clean: <span id="waterPercent">0%</span></div>
    <div>Time: <span id="timer">60</span></div>
    <div>Lives: <span id="lives">3</span></div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button id="startBtn">Start Game</button>
    <button id="resetBtn">Reset Game</button>
  </div>

  <div id="message" aria-live="polite">Press Start to begin cleaning the ocean.</div>
  <div id="cleanMeter" aria-label="Water cleanliness">
    <div id="cleanBar"></div>
  </div>

  <!-- GAME AREA -->
  <section id="gameArea">
    <div id="oceanOverlay"></div>
    <div id="trashBin" aria-label="Trash Bin">🗑️ BIN</div>
  </section>

</main>

<!-- IMPORTANT: LINK YOUR GAME LOGIC -->
<script src="script.js" defer></script>

</body>
</html>

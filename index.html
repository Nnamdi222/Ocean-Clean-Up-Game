<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Charity Water Cleanup</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<header class="brand-header">
  <div class="brand-logo" aria-hidden="true">
    <svg viewBox="0 0 64 64" width="46" height="46" aria-hidden="true">
      <path fill="#00b4d8" d="M32 60C32 60 4 37.4 4 22C4 11.5 11.5 4 22 4C28 4 32 11 32 11C32 11 36 4 42 4C52.5 4 60 11.5 60 22C60 37.4 32 60 32 60Z"/>
      <path fill="#caf0f8" d="M32 41.4C26.78 36.9 18 31.2 18 22.4C18 15.48 23.48 10 30.4 10C33.5 10 36.3 11.18 38.4 13.18C40.5 15.18 41.9 17.9 41.9 21.1C41.9 31.8 37.9 38.8 32 41.4Z"/>
    </svg>
  </div>
  <div>
    <h1>Charity Water Cleanup</h1>
    <div class="charity-badge">Official Charity Water Theme</div>
  </div>
</header>

<main>

  <!-- DASHBOARD -->
  <div class="dashboard">
    <div>Score: <span id="score">0</span></div>
    <div>Best: <span id="highScore">0</span></div>
    <div>Clean: <span id="waterPercent">0%</span></div>
    <div>Time: <span id="timer">60</span></div>
    <div>Lives: <span id="lives">3</span></div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button id="startBtn">Start Game</button>
    <button id="resetBtn">Reset Game</button>
  </div>

  <div id="message" aria-live="polite">Press Start to begin cleaning water for Charity Water.</div>
  <div id="cleanMeter" aria-label="Water cleanliness">
    <div id="cleanBar"></div>
  </div>

  <!-- GAME AREA -->
  <section id="gameArea">
    <div id="oceanOverlay"></div>
    <div id="trashBin" aria-label="Clean Water Bin">💧 CLEAN</div>
  </section>

</main>

<!-- IMPORTANT: LINK YOUR GAME LOGIC -->
<script src="script.js" defer></script>

</body>
</html>
